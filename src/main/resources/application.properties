# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Spring Core Application
spring.application.name=crop-sowing-intelligence
spring.profiles.active=dev

# HikariCP Database Connection Pool
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crop_monitoring_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:springstudent}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=ApAgriHikariCP

# Hibernate & JPA Spatial Configurations
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# Flyway Migrations Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Jackson Date Formatting Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Security JWT Configurations
app.security.jwt.secret=${JWT_SECRET:9a6Zp0Wv2BxYc4DeFgHiJkLmNoPqRsTuVwXyZ1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p}
app.security.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.security.jwt.header=Authorization
app.security.jwt.token-prefix=Bearer 

# AI Classification & Sowing Scheduler Configurations
app.classification.scheduler.enabled=true
app.classification.scheduler.cron=0 0 1 * * ?
app.classification.scheduler.simulation-enabled=true
app.classification.scheduler.interval-ms=60000

# Swagger / OpenAPI Documentation Configurations
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=list
springdoc.show-actuator=false

# Logging Configurations
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.ap.agri.cropmonitoring=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/crop_sowing_intelligence.log
